<div class="max-w-7xl mx-auto px-4 py-8 animate-in fade-in duration-500">
    <nav class="flex text-xs md:text-sm text-gray-400 mb-8 gap-2 uppercase tracking-widest">
        <a href="#" class="hover:text-black transition-colors">Trang chủ</a> <span>/</span>
        <a href="#" class="hover:text-black transition-colors">Nữ</a> <span>/</span>
        <span class="text-gray-900 font-bold" id="breadcrumb-active">Chi tiết sản phẩm</span>
    </nav>

    <div class="flex flex-col lg:flex-row gap-12 items-start">
        <div class="w-full lg:w-[50%] flex gap-4">
            <div id="product-thumbs" class="hidden md:flex flex-col gap-3 w-20 shrink-0">
                </div>

            <div class="relative flex-1 aspect-[3/4] rounded-[2.5rem] overflow-hidden bg-gray-50 group border border-gray-100 shadow-inner">
                <img id="main-product-image" src="" class="w-full h-full object-cover transition-all duration-700 group-hover:scale-105">
                <div class="absolute top-6 left-6 bg-red-500 text-white text-[10px] font-black px-3 py-1 rounded-full shadow-lg uppercase italic" id="product-tag-sale">
                    -0%
                </div>
            </div>
        </div>

        <div class="flex-1 space-y-8 w-full">
            <div class="space-y-4">
                <h1 id="product-name-display" class="text-3xl md:text-4xl font-black text-gray-900 leading-tight tracking-tight">
                    Tên sản phẩm
                </h1>
                <div class="flex items-center gap-6">
                    <div class="flex items-baseline gap-3">
                        <span id="current-price" class="text-3xl font-black text-[#bc9c75]">0đ</span>
                        <span id="old-price" class="text-lg text-gray-300 line-through decoration-gray-200">0đ</span>
                    </div>
                    <div class="h-4 w-[1px] bg-gray-200"></div>
                    <span class="text-sm text-gray-400 font-medium italic">Tình trạng: <span class="text-green-500">Còn hàng</span></span>
                </div>
            </div>

            <div class="space-y-4 p-6 bg-gray-50/50 rounded-[2rem] border border-gray-100">
                <p class="text-xs font-black text-gray-400 uppercase tracking-widest">Màu sắc: <span id="color-label" class="text-gray-900 ml-2">Chưa chọn</span></p>
                <div id="variant-options" class="flex flex-wrap gap-3">
                    </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-3">
                    <p class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Kích thước</p>
                    <div class="flex gap-2">
                        <button class="w-12 h-12 rounded-2xl border-2 border-gray-100 text-sm font-bold hover:border-[#bc9c75] transition-all">S</button>
                        <button class="w-12 h-12 rounded-2xl border-2 border-black bg-black text-white text-sm font-bold shadow-xl shadow-black/10">M</button>
                        <button class="w-12 h-12 rounded-2xl border-2 border-gray-100 text-sm font-bold hover:border-[#bc9c75] transition-all">L</button>
                    </div>
                </div>
                <div class="space-y-3">
                    <p class="text-xs font-black text-gray-400 uppercase tracking-widest ml-1">Số lượng</p>
                    <div class="flex items-center bg-white border border-gray-100 rounded-2xl h-12 w-32 px-2 shadow-sm">
                        <button class="w-full text-gray-400 hover:text-black">-</button>
                        <input type="text" value="1" class="w-full text-center font-bold text-sm outline-none">
                        <button class="w-full text-gray-400 hover:text-black">+</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <button class="flex-1 h-16 bg-[#bc9c75] text-white rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-[#bc9c75]/20 hover:scale-[1.02] active:scale-95 transition-all">
                    Thêm vào giỏ
                </button>
                <button class="flex-1 h-16 bg-black text-white rounded-[1.5rem] font-black uppercase tracking-widest shadow-xl shadow-black/10 hover:scale-[1.02] active:scale-95 transition-all">
                    Mua ngay
                </button>
            </div>
        </div>
    </div>
</div>
