<div class="max-w-7xl mx-auto px-4 py-10 animate-in fade-in duration-500">
    <div class="flex flex-col md:flex-row gap-8">
        <section class="flex-1">
            <div class="bg-white rounded-4xl shadow-xl shadow-gray-200/50 border border-gray-100 p-8 md:p-12 relative overflow-hidden">
                
                <div id="tab-profile" class="tab-content space-y-8 animate-in slide-in-from-bottom-4 duration-500">
                    <div>
                        <h2 class="text-2xl font-black text-gray-900">Hồ sơ cá nhân</h2>
                    </div>

                    <div class="bg-[#bc9c75]/5 rounded-3xl p-6 flex items-center gap-6 border border-[#bc9c75]/10">
                        <div class="w-20 h-20 rounded-2xl bg-[#bc9c75] flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-[#bc9c75]/30">
                            AC
                        </div>
                        <div>
                            <button type="button" class="bg-white border border-gray-200 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 hover:bg-gray-50 transition-all">
                                <i class="ri-camera-line"></i> Thay đổi ảnh
                            </button>
                            <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-wider font-medium">JPG, PNG • Tối đa 2MB</p>
                        </div>
                    </div>

                    <form id="form-profile" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Tên đăng nhập</label>
                            <input type="text" id="p-username" disabled class="w-full px-5 py-3 bg-gray-50 border border-gray-100 rounded-2xl text-gray-400 cursor-not-allowed outline-none">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Họ và tên</label>
                            <input type="text" id="p-fullname" class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-[#bc9c75] focus:ring-4 focus:ring-[#bc9c75]/10 outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Email</label>
                            <input type="email" id="p-email" class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-[#bc9c75] outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Số điện thoại</label>
                            <input type="text" id="p-phone" class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-[#bc9c75] outline-none transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Giới tính</label>
                            <select id="p-gender" class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-[#bc9c75] outline-none appearance-none bg-white">
                                <option value="Nam">Nam</option>
                                <option value="Nữ">Nữ</option>
                                <option value="Khác">Khác</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-700 ml-1">Ngày sinh</label>
                            <input type="date" id="p-dob" class="w-full px-5 py-3 border border-gray-200 rounded-2xl focus:border-[#bc9c75] outline-none transition-all">
                        </div>
                        

                        <div class="md:col-span-2 pt-6 flex flex-col md:flex-row items-center justify-between gap-4">
                            <button type="button" id="edit-toggle-btn" 
                                    class="w-full md:w-auto bg-[#bc9c75] text-white px-10 py-4 rounded-2xl font-bold shadow-lg shadow-[#bc9c75]/30 hover:bg-[#a68663] transition-all flex items-center justify-center gap-2">
                                <i class="ri-edit-line"></i>
                                <span>Chỉnh sửa hồ sơ</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </div>
</div>
