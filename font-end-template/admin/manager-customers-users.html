<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh sách mẫu - Fast Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/asset/css/admin.css">
</head>
<body class="bg-[#f8f9fa] font-['Inter']">

    <div id="content-area" style="transition: opacity 0.15s ease-in-out;">
    </div>

    


    <!-- Khách hàng -->
    <template id="tpl-customers">
        <div class="mb-6 flex justify-between items-center">
            <h2 class="text-xl font-bold text-gray-800">Danh sách Khách hàng</h2>
            <div class="relative w-72">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" placeholder="Tìm theo tên, email hoặc SĐT..." class="w-full bg-white border border-gray-100 rounded-xl py-2.5 pl-10 pr-4 text-[11px] outline-none shadow-sm focus:ring-1 focus:ring-[#bc9c75]">
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
            <div class="bg-white p-5 rounded-2xl border border-gray-50 shadow-sm hover:border-[#bc9c75]/30 transition-all group">
                <div class="flex items-start justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-[#fcfaf8] rounded-2xl flex items-center justify-center border border-gray-50 group-hover:border-[#bc9c75]/20 transition-all">
                            <i class="fa-solid fa-user-tie text-[#bc9c75] text-lg"></i>
                        </div>
                        <div>
                            <h4 class="text-sm font-black text-gray-800 uppercase tracking-tight">Nguyễn Hoàng Nam</h4>
                            <p class="text-[10px] text-gray-400">hoangnam@gmail.com</p>
                        </div>
                    </div>
                    <span class="bg-[#bc9c75]/10 text-[#bc9c75] px-2 py-0.5 rounded text-[8px] font-black uppercase">Gold Member</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 py-3 border-y border-gray-50 border-dashed">
                    <div>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Tổng chi tiêu</p>
                        <p class="text-[13px] font-black text-gray-800">12.850.000đ</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Số đơn mua</p>
                        <p class="text-[13px] font-black text-gray-800">24 đơn</p>
                    </div>
                </div>

                <div class="mt-4 flex justify-between items-center">
                    <span class="text-[10px] text-gray-400 font-medium">SĐT: 0912.xxx.456</span>
                    <button class="text-[10px] font-bold text-[#bc9c75] hover:underline uppercase tracking-widest">Xem lịch sử <i class="fa-solid fa-chevron-right ml-1 text-[8px]"></i></button>
                </div>
            </div>
        </div>
    </template>

   

    <!-- Hỗ trợ khách hàng -->
    <template id="tpl-support">
        <div id="support-container" class="flex h-[calc(100vh-140px)] bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden relative">
            
            <div id="side-panel" class="w-full md:w-80 flex-shrink-0 border-r border-gray-50 flex flex-col bg-[#fcfaf8]/50 absolute md:relative z-20 transition-transform duration-300">
                <div class="p-5 bg-white border-b border-gray-50">
                    <h2 class="text-xs font-black text-gray-800 uppercase tracking-widest">Tin nhắn</h2>
                </div>
                <div class="flex-1 overflow-y-auto custom-scrollbar">
                    <div onclick="toggleChat(true)" class="p-4 flex items-center gap-3 bg-white border-l-4 border-[#bc9c75] cursor-pointer hover:bg-gray-50">
                        <div class="w-10 h-10 rounded-xl bg-[#bc9c75]/10 flex items-center justify-center text-[#bc9c75] font-black text-xs">NA</div>
                        <div class="flex-1">
                            <h4 class="text-[11px] font-bold text-gray-800 uppercase">Nguyễn Anh</h4>
                            <p class="text-[10px] text-gray-400 truncate">Voucher này dùng thế nào ạ?</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="main-chat" class="flex-1 flex flex-col bg-white absolute inset-0 md:relative z-30 translate-x-full md:translate-x-0 transition-transform duration-300">

                

                <div class="p-4 border-b border-gray-50 bg-white flex justify-between items-center z-10 shadow-sm">
                    <div class="flex items-center gap-3">
                        <button onclick="toggleChat(false)" class="md:hidden w-8 h-8 flex items-center justify-center text-gray-400 hover:bg-gray-100 rounded-full">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>
                        
                        <div class="w-10 h-10 rounded-xl bg-[#bc9c75] text-white flex items-center justify-center font-black text-xs">NA</div>
                        <div>
                            <h4 class="text-[12px] font-black text-gray-800 uppercase">Nguyễn Anh</h4>
                            <span class="text-[9px] text-green-500 font-bold uppercase tracking-tighter animate-pulse">● Đang hoạt động</span>
                        </div>
                    </div>
                </div>

                <div class="flex-1 overflow-y-auto p-4 sm:p-6 space-y-6 bg-[#fcfaf8]/30 custom-scrollbar" id="message-container">
                    <div class="flex items-end gap-2 max-w-[90%] md:max-w-[70%]">
                        <div class="bg-white border border-gray-100 p-3 sm:p-3.5 rounded-2xl rounded-bl-none shadow-sm text-[12px] text-gray-700 leading-relaxed">
                            Chào shop, mình muốn hỏi về mã giảm giá SUMMER2026 sao mình áp dụng không được?
                        </div>
                    </div>

                    <div class="flex flex-row-reverse items-end gap-2 ml-auto max-w-[90%] md:max-w-[70%]">
                        <div class="bg-[#bc9c75] p-3 sm:p-3.5 rounded-2xl rounded-br-none text-white text-[12px] shadow-md shadow-[#bc9c75]/20 font-medium">
                            Chào bạn, shop xin lỗi về sự cố này. Bạn vui lòng kiểm tra xem đơn hàng đã đạt 500k chưa ạ?
                        </div>
                    </div>
                </div>

                <div class="p-4 bg-white border-t border-gray-50 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)]">
                    <div class="flex items-center gap-2 sm:gap-3 bg-gray-50 p-1.5 pl-3 sm:pl-4 rounded-2xl border border-gray-100 focus-within:bg-white focus-within:border-[#bc9c75]/30 transition-all">
                        <button class="text-gray-400 hover:text-[#bc9c75] hidden sm:block"><i class="fa-regular fa-face-smile text-lg"></i></button>
                        <input type="text" placeholder="Nhập phản hồi..." class="flex-1 bg-transparent border-none outline-none text-[12px] font-medium py-2 min-w-0">
                        <button class="bg-[#bc9c75] text-white px-4 sm:px-6 py-2.5 rounded-xl text-[11px] font-black uppercase tracking-widest shadow-md shadow-[#bc9c75]/30 flex items-center gap-2 hover:scale-105 active:scale-95 transition-all">
                            <span class="hidden xs:inline">Gửi</span> <i class="fa-solid fa-paper-plane text-[9px]"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </template>


    <!-- Quản lý nhân sự -->
    <template id="tpl-hr">
        <div class="mb-6 flex flex-col sm:flex-row justify-end items-start sm:items-center gap-4">
            

            <button class="w-full sm:w-auto px-5 py-2.5 bg-[#bc9c75] text-white rounded-xl text-xs font-bold shadow-md shadow-[#bc9c75]/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus text-[10px]"></i> Thêm chức vụ
            <button onclick="loadPage('add-employee')" class="w-full sm:w-auto px-5 py-2.5 bg-[#bc9c75] text-white rounded-xl text-xs font-bold shadow-md shadow-[#bc9c75]/20 hover:opacity-90 transition-all flex items-center justify-center gap-2">
                <i class="fa-solid fa-user-plus text-[10px]"></i> Thêm nhân viên
            </button>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border border-gray-50 overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left border-collapse min-w-[700px]">
                    <thead class="bg-[#fcfaf8] border-b border-gray-50">
                        <tr>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">Nhân viên</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest">CHức vụ</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Liên hệ</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Ngày gia nhập</th>
                            <th class="px-6 py-5 text-[10px] font-black text-gray-400 uppercase tracking-widest text-center">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-50 text-[12px]">
                        <tr class="hover:bg-gray-50/50 transition-all group">
                            <td class="px-6 py-4">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 rounded-full bg-[#bc9c75]/10 flex items-center justify-center text-[#bc9c75] font-black border-2 border-white shadow-sm">
                                        <i class="fa-solid fa-user-shield"></i>
                                    </div>
                                    <div>
                                        <div class="font-black text-gray-800 uppercase tracking-tighter">Trần Quốc Bảo</div>
                                        <div class="text-[10px] text-gray-400">bao.tq@company.com</div>
                                    </div>
                                </div>
                            </td>
                            <td class="px-6 py-4">
                                <span class="px-3 py-1 bg-red-50 text-red-500 rounded-lg font-black text-[9px] uppercase tracking-widest border border-red-100">Administrator</span>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="font-bold text-gray-600">0902.xxx.789</div>
                            </td>
                            <td class="px-6 py-4 text-center">
                                <div class="text-gray-400 font-medium">10/01/2026</div>
                            </td>
                            <td class="px-6 py-4 text-center space-x-2">
                                    <button onclick="openUserDetail(item)" class="text-gray-400 hover:text-[#bc9c75] transition-all">
                                        <i class="fa-regular fa-pen-to-square"></i>
                                    </button>
                            </td>
                        </tr>
                        </tbody>
                </table>
            </div>
        </div>
    </template>


    <template id="tpl-add-employee">
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-[100] flex items-center justify-center p-4 animate-in fade-in duration-200">
            <div class="max-w-4xl w-full bg-white rounded-[32px] shadow-2xl border border-gray-50 overflow-hidden animate-in zoom-in duration-300">
                
                <div class="px-8 py-5 border-b border-gray-50 bg-[#fcfaf8]/50 flex justify-between items-center">
                    
                    <button onclick="closeModal()" class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-sm hover:bg-red-50 hover:text-red-500 transition-all">
                        <i class="fa-solid fa-xmark text-xs"></i>
                    </button>
                </div>

                <form id="form-add-employee" onsubmit="handleSaveEmployee(event)" class="p-8">
                    <div class="flex flex-col md:flex-row gap-10">
                        <div class="w-full md:w-1/3 flex flex-col items-center">
                            <div class="relative group cursor-pointer w-44 h-44">
                                <div id="preview-box" class="w-full h-full rounded-[40px] bg-gray-50 border-2 border-dashed border-gray-200 flex flex-col items-center justify-center overflow-hidden transition-all group-hover:border-[#bc9c75]/50">
                                    <i class="fa-solid fa-camera text-gray-300 text-3xl mb-2"></i>
                                    <span class="text-[9px] text-gray-400 font-bold uppercase">Tải ảnh lên</span>
                                    <img id="avatar-preview" class="hidden absolute inset-0 w-full h-full object-cover">
                                </div>
                                <input type="file" id="inp-avatar" class="hidden" accept="image/*" onchange="previewAvatar(event)">
                                <label for="inp-avatar" class="absolute inset-0 cursor-pointer"></label>
                            </div>
                            <p class="mt-4 text-[9px] text-gray-400 text-center leading-relaxed">Định dạng JPG, PNG, WEBP (Max 2MB)</p>
                        </div>

                        <div class="flex-1 space-y-6">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div class="col-span-2">
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">Họ và tên</label>
                                    <input type="text" name="fullName" required class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none focus:ring-1 focus:ring-[#bc9c75]">
                                </div>

                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">Ngày sinh</label>
                                    <input type="date" name="dob" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none">
                                </div>

                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">Giới tính</label>
                                    <select name="gender" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none appearance-none">
                                        <option value="Nam">Nam</option>
                                        <option value="Nữ">Nữ</option>
                                        <option value="Khác">Khác</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">Chức vụ</label>
                                    <input type="text" name="role" placeholder="Ví dụ: Quản lý" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none">
                                </div>

                                <div>
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">SĐT</label>
                                    <input type="tel" name="phone" placeholder="09xxxxxxx" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none">
                                </div>

                                <div class="col-span-2">
                                    <label class="block text-[9px] text-gray-400 font-bold uppercase mb-2 tracking-tighter">Địa chỉ</label>
                                    <textarea name="address" rows="2" class="w-full bg-gray-50 border border-gray-100 rounded-xl py-3 px-4 text-sm font-bold text-gray-800 outline-none resize-none"></textarea>
                                </div>
                            </div>

                            <div class="pt-6 border-t border-gray-50 flex gap-3">
                                <button type="submit" class="px-10 py-3.5 bg-[#bc9c75] text-white text-[11px] font-black rounded-xl uppercase tracking-[0.2em] shadow-lg shadow-[#bc9c75]/20 hover:scale-105 active:scale-95 transition-all">
                                    Lưu nhân sự
                                </button>
                                <button type="button" onclick="closeModal()" class="px-8 py-3.5 bg-gray-50 text-gray-400 text-[11px] font-black rounded-xl uppercase tracking-[0.2em] hover:bg-gray-100 transition-all">
                                    Hủy bỏ
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </template>


    <template id="tpl-user-detail">
        <div class="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-in fade-in duration-200">
            
            <div class="max-w-4xl w-full bg-white rounded-[32px] shadow-2xl border border-gray-50 overflow-hidden animate-in zoom-in duration-300">
                <div class="h-32 bg-gradient-to-r from-[#bc9c75]/20 to-[#fcfaf8] border-b border-gray-50 relative">
                    <button onclick="closeModal()" class="absolute top-5 right-5 w-8 h-8 bg-white/80 rounded-full flex items-center justify-center hover:bg-white transition-all shadow-sm">
                        <i class="fa-solid fa-xmark text-gray-400"></i>
                    </button>
                </div>
                
                <div class="px-8 pb-10 -mt-16">
                    <div class="flex flex-col md:flex-row gap-8 items-start">
                        <div class="w-full md:w-1/3 flex flex-col items-center text-center">
                            <div class="relative group">
                                <img src="" class="w-40 h-40 rounded-[32px] object-cover border-4 border-white shadow-md js-detail-img">
                                <span class="absolute -bottom-2 right-4 bg-green-500 w-5 h-5 rounded-full border-4 border-white"></span>
                            </div>
                            <h3 class="mt-6 text-xl font-black text-gray-800 uppercase tracking-tight js-detail-name">---</h3>
                            <p class="text-[#bc9c75] font-bold text-xs uppercase tracking-[0.2em] mt-1 js-detail-role">---</p>
                            <div class="mt-4 px-4 py-2 bg-gray-50 rounded-xl text-[10px] text-gray-400 font-bold uppercase tracking-wider">
                                Gia nhập: <span class="text-gray-700 js-detail-join-date">--/--/----</span>
                            </div>
                        </div>

                        <div class="flex-1 w-full">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div class="space-y-4">
                                    <h4 class="text-[11px] font-black text-gray-300 uppercase tracking-[0.3em] border-b border-gray-50 pb-2">Hồ sơ cá nhân</h4>
                                    <div>
                                        <label class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Ngày sinh</label>
                                        <p class="text-sm font-black text-gray-800 js-detail-dob">--/--/----</p>
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Giới tính</label>
                                        <p class="text-sm font-black text-gray-800 js-detail-gender">---</p>
                                    </div>
                                </div>

                                <div class="space-y-4">
                                    <h4 class="text-[11px] font-black text-gray-300 uppercase tracking-[0.3em] border-b border-gray-50 pb-2">Thông tin liên lạc</h4>
                                    <div>
                                        <label class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Số điện thoại</label>
                                        <p class="text-sm font-black text-gray-800 js-detail-phone">---</p>
                                    </div>
                                    <div>
                                        <label class="text-[9px] text-gray-400 font-bold uppercase tracking-tighter">Email</label>
                                        <p class="text-sm font-black text-gray-800 js-detail-email">---</p>
                                    </div>
                                </div>

                                <div class="md:col-span-2 space-y-4 pt-2">
                                    <h4 class="text-[11px] font-black text-gray-300 uppercase tracking-[0.3em] border-b border-gray-50 pb-2">Địa chỉ hiện tại</h4>
                                    <div>
                                        <p class="text-sm font-black text-gray-800 leading-relaxed js-detail-address">---</p>
                                    </div>
                                </div>
                            </div>

                            <div class="mt-10 pt-6 border-t border-gray-50 flex gap-3">
                                <button class="px-8 py-3 bg-[#bc9c75] text-white text-[10px] font-black rounded-xl uppercase tracking-[0.2em] shadow-lg shadow-[#bc9c75]/20 hover:scale-105 transition-all">Lưu thay đổi</button>
                                <button onclick="closeModal()" class="px-6 py-3 bg-gray-50 text-gray-400 text-[10px] font-black rounded-xl uppercase tracking-[0.2em] hover:bg-gray-100 transition-all">Đóng cửa sổ</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </template>


</body>
</html>
