<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý tài khoản - FAST FASHION</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/font-end-template/asset/css/admin.css">
   
</head>
<body class="bg-gray-50 flex flex-col h-screen overflow-hidden">

    <header id="header" class="h-16 flex-none bg-white border-b border-gray-100 flex items-center justify-between px-3 sm:px-6 md:px-8 gap-6 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <img 
            src="/font-end-template/asset/img/z7574203815922_6f6041439e8ca1d9b4cdea22b2f962d4.jpg"
            alt="FastFashion Logo"
            class="h-10 sm:h-12 md:h-16 ml-4 md:ml-7 object-contain">
        </div>

        <div class="relative w-96">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
            <input type="text" 
            placeholder="Tìm kiếm đơn hàng, khách hàng..."
            class="w-full bg-gray-100 border-none rounded-lg py-2 pl-10 pr-4 text-sm focus:ring-1 focus:ring-[#bc9c75]">
        </div>

        <div class="flex items-center gap-6">

            <i class="fa-regular fa-bell text-gray-400 text-lg cursor-pointer hover:text-gray-600"></i>

            <div class="relative">

                <div onclick="toggleUserMenu()" class="flex items-center gap-3 cursor-pointer">

                    <div class="w-9 h-9 bg-[#bc9c75] text-white rounded-full flex items-center justify-center text-sm font-bold"> AC</div>

                    <div class="text-[12px] leading-tight">
                        <p class="font-semibold text-gray-800">Admin</p>
                        <p class="text-gray-400">Chủ cửa hàng</p>
                    </div>
                </div>
            </div>
        </div>
            <div id="userMenu"
                class="hidden absolute top-10 right-0 mt-4 w-72 bg-white rounded-2xl shadow-xl border border-gray-100 p-6">

                    <div class="flex flex-col items-center text-center">

                        <div class="w-16 h-16 bg-[#bc9c75] text-white rounded-full flex items-center justify-center text-lg font-bold">AC</div>

                        <p class="mt-4 font-semibold text-gray-800 text-[15px]">Nguyễn Văn Admin</p>

                        <p class="text-sm text-gray-400">admin@fastfashion.com</p>

                        <button onclick="loadPage('account-management')" class="mt-5 w-full border border-gray-200 rounded-lg py-2 text-sm hover:bg-gray-50 transition block text-center">
                            <a href="/font-end-template/admin/account-management.html" class="btn-manage">Quản lý tài khoản của bạn</a>
                        </button>

                        
                            
                        <button class="mt-5 text-red-500 flex items-center gap-2 text-sm hover:opacity-80">
                            <i class="fa-solid fa-right-from-bracket"></i>Đăng xuất</button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <div class="bg-[#f8f9fa] px-4 py-2 lg:hidden">
        <button onclick="toggleSidebar()" class="text-2xl p-2 text-gray-600 hover:text-black">
            <i class="fa-solid fa-bars"></i>
        </button>
    </div>

    <div class="flex flex-1 overflow-hidden">
        <aside id="sidebar" class="fixed lg:static top-16 w-64 lg:w-72 bg-white border-r border-gray-100 h-[calc(100vh-64px)] lg:h-full flex flex-col transition-all duration-300 -translate-x-full lg:translate-x-0 z-40 overflow-y-auto custom-scrollbar">
            <nav class=" flex-1 px-4 space-y-1 mt-6">
                    <div id="thong-tin" onclick="switchTab('thong-tin')" class="nav-item group active">
                        <div class="nav-icon-box">
                            <i class="fa-solid fa-box-archive text-[15px]"></i>
                        </div>
                        <span class="font-medium">Hồ sơ cá nhân</span>
                    </div>
                    <div id="account" onclick="switchTab('account')" class="nav-item group">
                        <div class="nav-icon-box">
                            <i class="fa-solid fa-circle-plus text-[15px]"></i>
                        </div>
                        <span class="font-medium">Đổi mật khẩu</span>
                    </div>
            </nav>
        </aside>
    
        <main class="flex-1 overflow-y-auto p-4 md:p-10">
            
            <div id="tab-thong-tin" class="tab-content active">
                <div class="bg-white rounded-[24px] shadow-sm p-6 md:p-10 max-w-4xl mx-auto border border-gray-100">
                    <div class="mb-8">
                        <h2 class="text-2xl font-bold text-gray-800">Hồ sơ cá nhân</h2>
                        <p class="text-sm text-gray-400">Thông tin này sẽ được hiển thị trên hệ thống quản trị</p>
                    </div>

                    <div class="bg-[#fffbf7] rounded-2xl p-6 flex items-center gap-6 mb-8 border border-orange-50">
                        <div class="h-20 w-20 bg-[#bc9c75] text-white rounded-full flex items-center justify-center text-2xl font-bold shadow-inner">AC</div>
                        <div>
                            <button class="bg-white border border-[#bc9c75] text-[#bc9c75] px-4 py-2 rounded-lg text-xs font-bold hover:bg-[#bc9c75] hover:text-white transition-all shadow-sm">
                                <i class="fa-solid fa-camera mr-2"></i> Thay đổi ảnh
                            </button>
                            <p class="text-[10px] text-gray-400 mt-2 uppercase tracking-wider">JPG, PNG • Tối đa 2MB</p>
                        </div>
                    </div>

                    <form class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Họ và tên</label>
                                <input type="text" class="w-full rounded-xl p-3 bg-white border border-gray-200 outline-none focus:border-[#bc9c75] focus:ring-2 focus:ring-[#bc9c75]/10 transition-all" placeholder="Nguyễn Văn A">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Email</label>
                                <input type="email" class="w-full rounded-xl p-3 bg-gray-50 border border-gray-100 text-gray-400 cursor-not-allowed" value="admin@fastfashion.com" readonly>
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Số điện thoại</label>
                                <input type="text" class="w-full rounded-xl p-3 bg-white border border-gray-200 outline-none focus:border-[#bc9c75]" placeholder="0901234567">
                            </div>
                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Giới tính</label>
                                <select class="w-full rounded-xl p-3 bg-white border border-gray-200 outline-none focus:border-[#bc9c75] appearance-none cursor-pointer">
                                    <option>Nam</option>
                                    <option>Nữ</option>
                                    <option>Khác</option>
                                </select>
                            </div>

                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Địa chỉ </label>
                                <input type="email" class="w-full rounded-xl p-3 bg-gray-50 border border-gray-100 text-gray-400 cursor-not-allowed" value="..." readonly>
                            </div>

                            <div class="space-y-2">
                                <label class="text-sm font-bold text-gray-700">Chức vụ</label>
                                <select class="w-full rounded-xl p-3 bg-white border border-gray-200 outline-none focus:border-[#bc9c75] appearance-none cursor-pointer">
                                    <option>Quản lý</option>
                                    <option>Nhân viên</option>
                                    <option>Khác</option>
                                </select>
                            </div>
                        </div>

                        <div class="mt-10 pt-8 border-t border-gray-100 flex justify-between items-center">
                            <a href="/font-end-template/admin/index.html" class="text-gray-400 hover:text-gray-600 font-semibold text-sm transition-all flex items-center gap-2">
                                <i class="fa-solid fa-arrow-left-long"></i> Quay lại
                            </a>
                            <button type="submit" class="bg-[#bc9c75] text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-[#bc9c75]/20 hover:scale-[1.02] active:scale-95 transition-all">
                                Lưu thay đổi
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="tab-account" class="tab-content">
                <div class="bg-white rounded-[24px] shadow-sm p-6 md:p-10 max-w-xl mx-auto border border-gray-100">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-gray-800">Đổi mật khẩu</h2>
                        <p class="text-sm text-gray-400 mt-1">Sử dụng mật khẩu mạnh để bảo vệ tài khoản</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Mật khẩu hiện tại</label>
                            <input type="password" class="w-full rounded-xl p-3 border border-gray-200 outline-none focus:border-[#bc9c75]" placeholder="••••••••">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Mật khẩu mới</label>
                            <input type="password" class="w-full rounded-xl p-3 border border-gray-200 outline-none focus:border-[#bc9c75]" placeholder="Mật khẩu mới">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-gray-700">Xác nhận lại mật khẩu</label>
                            <input type="password" class="w-full rounded-xl p-3 border border-gray-200 outline-none focus:border-[#bc9c75]" placeholder="Nhập lại mật khẩu mới">
                        </div>

                        <button class="w-full bg-[#bc9c75] text-white py-3.5 rounded-xl font-bold shadow-lg shadow-[#bc9c75]/20 hover:brightness-95 active:scale-95 transition-all mt-4">
                            Cập nhật mật khẩu
                        </button>

                        <a href="/font-end-template/admin/index.html" class="text-gray-400 hover:text-gray-600 font-semibold text-sm transition-all flex items-center gap-2">
                                <i class="fa-solid fa-arrow-left-long"></i> Quay lại
                            </a>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/font-end-template/asset/js/admin.js"></script>

</body>
</html>
