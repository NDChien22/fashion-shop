<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Fashion - Luxury Gold</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="/font-end-template/asset/css/style.css">
</head>
<body class="bg-gray-50">

    <header class="bg-white fixed top-0 left-0 z-50 w-full shadow-sm border-b border-gray-100 h-16 md:h-20 flex items-center">
        <nav class="container mx-auto flex items-center justify-between px-4 relative w-full">
            
            <div id="overlay" class="flex-1 md:hidden">
                <div class="text-2xl cursor-pointer inline-block" id="menu-btn">
                    <i class="ri-menu-4-line"></i>
                </div>
            </div>

            <div class="absolute left-1/2 -translate-x-1/2 md:static md:translate-x-0 z-20">
                <img src="/font-end-template/asset/img/z7574203815922_6f6041439e8ca1d9b4cdea22b2f962d4.jpg" 
                     alt="logo" class="w-16 md:w-24 h-auto block">
            </div>

            <div id="nav-menu" class="hidden md:flex flex-1 justify-center items-center gap-8 uppercase font-bold text-[18px] tracking-widest">
                <a href="#" class="hover-gold transition">Home</a>
                <a href="#" class="hover-gold transition">Shop</a>
                <a href="#" class="text-gold italic font-black">Final Sale</a>
            </div>

            <div class="flex-1 flex items-center justify-end gap-5 text-xl">
                <i class="ri-search-line cursor-pointer hidden md:block hover-gold"></i>
                <i class="ri-user-line cursor-pointer hidden md:block hover-gold"></i>
                
                <div class="relative cursor-pointer group">
                    <i class="ri-shopping-cart-line group-hover:text-gold transition"></i>
                    <span class="absolute -top-2 -right-2 bg-gold text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold shadow-sm">2</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="mt-16 md:mt-20">
        <section class="relative overflow-hidden w-full bg-gray-100 group">
            <div class="animate-banner" id="banner-list">
                <div class="banner-item">
                    <img src="https://2885371169.e.cdneverest.net/Simiconnector/BannerSlider/f/i/finalsale_topbanner_desktop-180326.webp" class="w-full h-[300px] md:h-[550px] object-cover">
                </div>
                <div class="banner-item">
                    <img src="https://th.bing.com/th/id/OIP.6VCB_MI-6nUEVw8o49hC1wHaEO?w=297&h=180&c=7&r=0&o=7&pid=1.7&rm=3" class="w-full h-[300px] md:h-[550px] object-cover">
                </div>
                <div class="banner-item">
                    <img src="https://trangtri360.com/wp-content/uploads/2024/05/bang-sale-quan-ao-8.jpg" class="w-full h-[300px] md:h-[550px] object-cover">
                </div>
                <div class="banner-item">
                    <img src="https://th.bing.com/th/id/OIP.o4j-lEIV_zoKfH4WoqvqGwHaEO?w=298&h=180&c=7&r=0&o=7&pid=1.7&rm=3" class="w-full h-[300px] md:h-[550px] object-cover">
                </div>
            </div>

            <button id="prev-btn" class="absolute z-50 left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/20 hover:bg-white backdrop-blur-md rounded-full flex items-center justify-center text-white hover:text-black opacity-0 group-hover:opacity-100 transition-all duration-300">
                <i class="ri-arrow-left-s-line text-2xl"></i>
            </button>
            <button id="next-btn" class="absolute z-50 right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-black/20 hover:bg-white backdrop-blur-md rounded-full flex items-center justify-center text-white hover:text-black opacity-0 group-hover:opacity-100 transition-all duration-300">
                <i class="ri-arrow-right-s-line text-2xl"></i>
            </button>

            <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-2">
                <div class="dot-1 h-1.5 rounded-full transition-all"></div>
                <div class="dot-2 h-1.5 rounded-full transition-all"></div>
                <div class="dot-3 h-1.5 rounded-full transition-all"></div>
                <div class="dot-4 h-1.5 rounded-full transition-all"></div>
            </div>
        </section>

        <section class="bg-white py-12">
            <div class="container mx-auto px-4">
                <div class="flex flex-col md:flex-row items-center justify-between border-b-2 border-gray-100 pb-6 mb-8 gap-4">
                    <div class="flex items-center gap-6">
                        <h2 class="text-3xl font-black text-gold italic uppercase tracking-tighter">Flash Sale</h2>
                        <div class="flex items-center gap-2">
                            <span class="bg-black text-white font-bold px-2 py-1 rounded shadow-sm" id="hours">02</span>
                            <span class="font-bold">:</span>
                            <span class="bg-black text-white font-bold px-2 py-1 rounded shadow-sm" id="minutes">45</span>
                            <span class="font-bold">:</span>
                            <span class="bg-black text-white font-bold px-2 py-1 rounded shadow-sm" id="seconds">00</span>
                        </div>
                    </div>
                    <a href="#" class="text-sm font-bold text-gray-400 hover:text-gold transition underline uppercase tracking-widest">Xem tất cả</a>
                </div>

                <div id="product-grid" class="flex overflow-x-auto gap-4 lg:gap-8 pb-6 scrollbar-hide snap-x snap-mandatory"></div>
                
        </section>

        <section class="max-w-7xl mx-auto px-4 py-16">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800 uppercase tracking-wider">Sản phẩm bán chạy</h2>
                    <div class="h-1 w-20 bg-[#bc9c75] mt-2"></div>
                </div>
                <a href="#" class="text-[#bc9c75] font-medium hover:underline transition-all">Xem tất cả <i class="ri-arrow-right-line"></i></a>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                
                <div class="group bg-white rounded-xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100">
                    <div class="relative overflow-hidden aspect-3/4">
                        <span class="absolute top-3 left-3 z-10 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded">HOT</span>
                        <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000&auto=format&fit=crop" 
                            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                        
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-800 hover:bg-[#bc9c75] hover:text-white transition-colors shadow-md">
                                <i class="ri-shopping-cart-2-line"></i>
                            </button>
                            <button class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-800 hover:bg-[#bc9c75] hover:text-white transition-colors shadow-md">
                                <i class="ri-eye-line"></i>
                            </button>
                        </div>
                    </div>

                    <div class="p-4 text-center">
                        <p class="text-sm text-gray-500 mb-1">Thời trang nữ</p>
                        <h3 class="font-semibold text-gray-800 truncate mb-2 group-hover:text-[#bc9c75] transition-colors">Váy lụa cao cấp dự tiệc</h3>
                        <div class="flex items-center justify-center gap-3">
                            <span class="text-[#bc9c75] font-bold text-lg">850.000đ</span>
                            <span class="text-gray-400 line-through text-sm">1.200.000đ</span>
                        </div>
                    </div>
                </div>

                </div>
        </section>
        
    </main>

    <script src="/font-end-template/asset/js/main.js"></script>

    <script>
        const products = [
            { id: 1, name: "Áo Phông Nam Gold Classic", category: "Luxury Edition", price: 199000, originalPrice: 398000, saleTag: "-50%", image: "https://canifa.com/img/cms/p/m/pm-ao-phong-nam.jpg" },
            { id: 2, name: "Sơ Mi Trắng Oxford Slim-fit", category: "Business Style", price: 350000, originalPrice: 700000, saleTag: "HOT", image: "https://product.hstatic.net/1000333923/product/ao_so_mi_nam_on_off_3_da6289b5c2d341999661445b736b761a_master.jpg" },
            { id: 3, name: "Đầm Đen Dự Tiệc Sang Trọng", category: "Lady Collection", price: 590000, originalPrice: 850000, saleTag: "-30%", image: "https://bizweb.dktcdn.net/100/438/408/products/vay-dam-nu-yody-dnm4026-den-6.jpg?v=1683515867117" },
            { id: 4, name: "Quần Jeans Xanh Navy", category: "Denim Series", price: 420000, originalPrice: 700000, saleTag: "-40%", image: "https://product.hstatic.net/1000184160/product/4_9771ba82e44d48508a5091c6e61138ec_master.jpg" },
            { id: 5, name: "Áo Khoác Bomber Streetwear", category: "Urban Style", price: 750000, originalPrice: 1200000, saleTag: "NEW", image: "https://product.hstatic.net/1000306633/product/f_a43e7786419d4263b82776c5b9679261_master.jpg" }
        ];

        function renderProducts() {
            const productGrid = document.getElementById('product-grid');
            
            productGrid.innerHTML = products.map(product => `
                <div class="group cursor-pointer flex-shrink-0 w-[220px] md:w-[280px] snap-start">
                    <div class="relative overflow-hidden bg-gray-50 rounded-sm">
                        <img src="${product.image}" class="w-full h-[280px] md:h-[380px] object-cover transform group-hover:scale-110 transition duration-700">
                        <span class="absolute top-3 left-3 bg-[#bc9c75] text-white text-[10px] font-bold px-2 py-1 rounded-sm uppercase shadow-md">${product.saleTag}</span>
                        <button class="absolute bottom-0 w-full bg-black/90 text-white py-3 text-xs font-bold translate-y-full group-hover:translate-y-0 transition-transform">
                            THÊM VÀO GIỎ
                        </button>
                    </div>
                    <div class="mt-4 text-center md:text-left">
                        <p class="text-[10px] text-gray-400 uppercase tracking-widest mb-1">${product.category}</p>
                        <h3 class="text-sm font-semibold text-gray-800 line-clamp-1 group-hover:text-[#bc9c75] transition">${product.name}</h3>
                        <div class="flex items-center justify-center md:justify-start gap-3 mt-1">
                            <span class="text-[#bc9c75] font-bold text-base">${product.price.toLocaleString()}đ</span>
                            <span class="text-gray-300 text-xs line-through">${product.originalPrice.toLocaleString()}đ</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', renderProducts);
    </script>
</body>
</html>
