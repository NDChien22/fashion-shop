<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh sách mẫu - Fast Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/asset/css/admin.css">
</head>
<body class="bg-[#f8f9fa] font-['Inter']">

    <div id="content-area" style="transition: opacity 0.15s ease-in-out;"></div>

        <template id="tpl-vouchers">
            <div class="mb-6 flex justify-between items-center">
                <div class="relative w-64">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-[10px]"></i>
                    <input type="text" placeholder="Tìm mã voucher..." class="w-full bg-white border border-gray-100 rounded-xl py-2 pl-9 pr-4 text-xs focus:ring-1 focus:ring-[#bc9c75] outline-none shadow-sm">
                </div>
                <button onclick="openForm('voucher')" class="px-4 py-2 bg-[#bc9c75] text-white rounded-xl text-xs font-semibold shadow-sm hover:opacity-90 transition">
                    <i class="fa-solid fa-plus mr-2"></i> Tạo mã mới
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-50 relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-16 h-16 bg-[#bc9c75]/10 rounded-bl-full flex items-center justify-center">
                        <i class="fa-solid fa-ticket text-[#bc9c75]"></i>
                    </div>
                    
                    <div class="flex flex-col gap-1">
                        <span class="text-[10px] font-black text-[#bc9c75] uppercase tracking-wider">CODE: SUMMER2026</span>
                        <h3 class="text-base font-bold text-gray-800">Giảm 10%</h3>
                        <p class="text-[11px] text-gray-400">Đơn tối thiểu: 500.000đ</p>
                    </div>
                    
                    <div class="mt-4 pt-4 border-t border-gray-50 space-y-3">
                        <div class="flex justify-between text-[10px]">
                            <span class="text-gray-400 uppercase font-bold tracking-tighter">Tiến độ: 45/100</span>
                            <span class="text-gray-500 font-bold tracking-tighter">Hết hạn: 30/08/2026</span>
                        </div>
                        <div class="w-full bg-gray-100 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-[#bc9c75] h-full" style="width: 45%"></div>
                        </div>
                    </div>

                    <div class="flex justify-between items-center mt-4">
                        <span class="text-[9px] text-green-500 font-bold bg-green-50 px-2 py-1 rounded-full border border-green-100 uppercase">Hoạt động</span>
                        
                        <div class="flex items-center gap-2">
                            <button onclick="openForm('voucher')" class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-[#bc9c75]/10 hover:text-[#bc9c75] transition-all">
                                <i class="fa-regular fa-pen-to-square"></i>
                            </button>
                            <button class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:bg-red-50 hover:text-red-500 transition-all">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </template>


    <template id="tpl-voucher-form">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-8 rounded-3xl border border-gray-50 shadow-sm space-y-8">
                    
                    <div>
                        <h4 class="text-[11px] font-black text-[#bc9c75] uppercase mb-5 flex items-center gap-2">
                             Thông tin cơ bản
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Mã giảm giá (Code)</label>
                                <input type="text" placeholder="Ví dụ: QUY2_2026" class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-mono font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none uppercase placeholder:text-gray-300">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Loại chiết khấu (Type)</label>
                                <select class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none appearance-none cursor-pointer">
                                    <option value="fixed">Số tiền cố định (VNĐ)</option>
                                    <option value="percent">Phần trăm (%)</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="pt-8 border-t border-gray-50">
                        <h4 class="text-[11px] font-black text-[#bc9c75] uppercase mb-5 flex items-center gap-2">
                             Giá trị & Hạn mức
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Mức giảm (Value)</label>
                                <div class="relative mt-2">
                                    <input type="number" placeholder="0" class="w-full bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                                    <span class="absolute right-4 top-1/2 -translate-y-1/2 text-[10px] font-bold text-gray-300 uppercase">Đơn vị</span>
                                </div>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Đơn tối thiểu (Min Order)</label>
                                <input type="number" placeholder="0" class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Giảm tối đa (Max Discount)</label>
                                <input type="number" 
                                placeholder="Không giới hạn" 
                                class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                            </div>
                        </div>
                    </div>

                    <div class="pt-8 border-t border-gray-50">
                        <h4 class="text-[11px] font-black text-[#bc9c75] uppercase mb-5 flex items-center gap-2">
                             Loại sản phẩm
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Bộ sưu tập</label>
                                <select id="prod-cate" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                                    <option value="">-- Không chọn --</option>
                                    <option>...</option>
                                    <option>...</option>
                                    <option>...</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Danh mục</label>
                                <select id="prod-cate" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                                    <option value="">-- Không chọn --</option>
                                    <option>Áo khoác</option>
                                    <option>Áo thun</option>
                                    <option>Quần</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="pt-8 border-t border-gray-50">
                        <h4 class="text-[11px] font-black text-[#bc9c75] uppercase mb-5 flex items-center gap-2">
                            Thời gian & Giới hạn
                        </h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Ngày bắt đầu</label>
                                <input type="date" 
                                class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-[11px] font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Ngày kết thúc</label>
                                <input type="date" 
                                class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-[11px] font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Số lượng phát hành</label>
                                <input type="number" 
                                placeholder="Ví dụ: 100" 
                                class="w-full mt-2 bg-gray-50 border-none rounded-2xl py-3.5 px-5 text-xs font-bold focus:ring-2 focus:ring-[#bc9c75]/20 outline-none">
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-3xl border border-gray-50 shadow-sm">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-xs font-black text-gray-800 uppercase tracking-widest">Trạng thái (Active)</h3>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="v-status" class="sr-only peer" checked>
                            <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-0.5 after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#bc9c75]"></div>
                        </label>
                    </div>
                    <p class="text-[10px] text-gray-400 font-medium leading-relaxed">Khi kích hoạt, khách hàng có thể áp dụng mã này ngay lập tức nếu thỏa mãn điều kiện.</p>
                </div>

                <div class="bg-[#bc9c75] p-6 rounded-4xl shadow-xl shadow-[#bc9c75]/20 relative overflow-hidden text-white min-h-[180px] flex flex-col justify-between">
                    <i class="fa-solid fa-ticket absolute -right-6 -top-6 text-white/10 text-9xl rotate-12"></i>
                    
                    <div class="relative z-10">
                        <span class="text-[9px] font-black uppercase tracking-[0.2em] px-2 py-1 bg-white/20 rounded">Preview Voucher</span>
                        <h4 class="text-2xl font-black mt-4 uppercase tracking-tighter" id="pre-val">Giảm --%</h4>
                        <p class="text-[10px] opacity-80 mt-1 font-medium" id="pre-min">Cho đơn hàng từ 0đ</p>
                    </div>

                    <div class="relative z-10 pt-4 border-t border-white/20 flex justify-between items-end">
                        <div>
                            <p class="text-[10px] font-bold opacity-60 uppercase">Mã: <span id="pre-code" class="text-white ml-1">CHƯA NHẬP</span></p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] opacity-60 uppercase font-bold text-white/50 italic">Hết hạn: --/--/----</p>
                        </div>
                    </div>
                </div>

                <div class="bg-blue-50/50 border border-blue-100/50 p-6 rounded-3xl">
                    <div class="flex items-center gap-3 mb-3 text-blue-500">
                        <i class="fa-solid fa-circle-info text-sm"></i>
                        <span class="text-[11px] font-black uppercase tracking-wider">Lưu ý</span>
                    </div>
                    <ul class="text-[10px] text-blue-400 space-y-2 font-medium">
                        <li class="flex gap-2">• <span class="flex-1">Trường "Giảm tối đa" chỉ áp dụng khi chọn loại "Phần trăm".</span></li>
                        <li class="flex gap-2">• <span class="flex-1">Ngày bắt đầu phải nhỏ hơn hoặc bằng ngày hiện tại để voucher có hiệu lực ngay.</span></li>
                    </ul>
                </div>

                <button onclick="loadPage('vouchers')" class="px-6 py-2.5 bg-white border border-gray-200 rounded-xl text-xs font-bold text-gray-500 hover:bg-gray-50 transition">Hủy bỏ</button>
                <button id="btn-save-voucher" class="px-6 py-2.5 bg-[#bc9c75] text-white rounded-xl text-xs font-bold shadow-md shadow-[#bc9c75]/20 hover:opacity-90 transition">Tạo Voucher</button>
            </div>
        </div>
    </template>



    <template id="tpl-flash-sale">
        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-green-50 text-green-600 rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-bolt"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase leading-none mb-1">Đang chạy</p>
                        <p class="text-lg font-bold">03 Chiến dịch</p>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-2xl border border-gray-100 shadow-sm flex items-center gap-4">
                    <div class="w-12 h-12 bg-[#fffbf7] text-[#bc9c75] rounded-xl flex items-center justify-center text-xl">
                        <i class="fa-solid fa-ticket"></i>
                    </div>
                    <div>
                        <p class="text-[10px] text-gray-400 font-bold uppercase leading-none mb-1">Mã giảm giá</p>
                        <p class="text-lg font-bold">12 Voucher</p>
                    </div>
                </div>

                <div class="flex items-center justify-end"> 
                    <button onclick="openForm('promotion')" class="bg-[#bc9c75] text-white px-6 py-2.5 rounded-[18px] text-[13px] font-bold shadow-md shadow-[#bc9c75]/20 hover:brightness-95 transition-all flex items-center gap-2">
                        <i class="fa-solid fa-plus text-[10px]"></i> Tạo khuyến mãi mới
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-gray-50 flex items-center justify-between">
                    <h3 class="font-bold text-gray-800">Danh sách chương trình</h3>
                    <div class="flex gap-2">
                        <span class="px-3 py-1 bg-gray-100 text-gray-500 rounded-full text-[10px] font-bold cursor-pointer">Tất cả</span>
                        <span class="px-3 py-1 bg-green-50 text-green-600 rounded-full text-[10px] font-bold cursor-pointer">Đang diễn ra</span>
                    </div>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead >
                            <tr class="bg-gray-50/50">
                                <th class="p-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Chương trình</th>
                                <th class="p-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Mức giảm</th>
                                <th class="p-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Thời gian</th>
                                <th class="p-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider">Trạng thái</th>
                                <th class="p-4 text-[11px] font-bold text-gray-400 uppercase tracking-wider text-right">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-gray-50">
                            <tr class="hover:bg-gray-50/50 transition-colors">
                                <td class="p-4">
                                    <div class="flex items-center gap-3">
                                        <div class="w-10 h-10 bg-orange-100 text-orange-600 rounded-lg flex items-center justify-center">
                                            <i class="fa-solid fa-tags"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm text-gray-800">Sale chào hè 2026</p>
                                            <p class="text-[10px] text-gray-400">Áp dụng cho toàn bộ váy nữ</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="p-4">
                                    <span class="font-bold text-red-500">-20%</span>
                                </td>
                                <td class="p-4">
                                    <div class="text-[11px] leading-tight">
                                        <p class="text-gray-600">Bắt đầu: 01/06/2026</p>
                                        <p class="text-gray-400">Kết thúc: 15/06/2026</p>
                                    </div>
                                </td>
                                <td class="p-4">
                                    <span class="px-2 py-1 bg-green-50 text-green-600 rounded text-[10px] font-bold">ĐANG CHẠY</span>
                                </td>
                                <td class="p-4 text-right">
                                    <button onclick="openForm('promotion')" class="text-gray-400 hover:text-[#bc9c75] mx-1"><i class="fa-solid fa-pen-to-square "></i></button>
                                    <button class="text-gray-400 hover:text-red-500 mx-1"><i class="fa-solid fa-trash"></i></button>
                                </td>
                            </tr>

                            <tr class="hover:bg-gray-50/50 transition-colors text-gray-400">
                                <td class="p-4">
                                    <div class="flex items-center gap-3 opacity-60">
                                        <div class="w-10 h-10 bg-gray-100 text-gray-500 rounded-lg flex items-center justify-center">
                                            <i class="fa-solid fa-calendar-check"></i>
                                        </div>
                                        <div>
                                            <p class="font-bold text-sm">Xả kho mùa đông</p>
                                            <p class="text-[10px]">Đã kết thúc vào tháng trước</p>
                                        </div>
                                    </div>
                                </td>
                                <td class="p-4 font-bold">-50%</td>
                                <td class="p-4 text-[11px]">31/12/2025</td>
                                <td class="p-4">
                                    <span class="px-2 py-1 bg-gray-100 text-gray-400 rounded text-[10px] font-bold">HẾT HẠN</span>
                                </td>
                                <td class="p-4 text-right text-gray-300">
                                    <button class="mx-1"><i class="fa-solid fa-eye"></i></button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>

   
   <template id="tpl-promotion-form">
        <div class="max-w-6xl mx-auto my-10 p-8 bg-white rounded-[40px] shadow-2xl shadow-gray-200/50 animate-fade-in border border-gray-50">
            
            <div class="mb-6 pb-4 border-b border-gray-100">
                <p class="text-[9px] font-black text-[#bc9c75] uppercase tracking-widest mb-3 flex items-center gap-2">
                    Thông tin chung
                </p>
                <div class="relative max-w-2xl"> <input type="text" id="promo-name" 
                        placeholder="Nhập tên chương trình..." 
                        class="w-full px-5 py-3 bg-gray-50/50 border border-gray-100 rounded-xl focus:border-[#bc9c75]/30 focus:bg-white outline-none font-bold text-sm text-gray-700 transition-all">
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 space-y-6">
                    <div class="bg-gray-50/80 p-6 rounded-4xl border border-gray-100">
                        <p class="text-[10px] font-black text-[#bc9c75] uppercase tracking-widest mb-4 flex items-center gap-2">
                            Cấu hình ưu đãi
                        </p>
                        
                        <div class="space-y-4">
                            <div class="relative group">
                                <input type="number" id="promo-value" placeholder="0" class="w-full pl-6 pr-20 py-2.5 bg-white border-2 border-transparent rounded-2xl shadow-sm focus:border-[#bc9c75]/30 outline-none font-black text-xl text-red-500 transition-all">
                                <select id="promo-type" class="absolute right-3 top-2.5 bottom-2.5 bg-gray-50 border-none rounded-xl text-xs font-black px-3 cursor-pointer">
                                    <option value="percent">%</option>
                                    <option value="amount">đ</option>
                                </select>
                            </div>

                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-1">
                                    <label class="text-[9px] font-black text-gray-400 ml-2 uppercase">Bắt đầu</label>
                                    <input type="datetime-local" id="promo-start" class="w-full px-4 py-3 bg-white border-none rounded-xl text-[11px] font-bold text-gray-600 shadow-sm outline-none">
                                </div>
                                <div class="space-y-1">
                                    <label class="text-[9px] font-black text-gray-400 ml-2 uppercase">Kết thúc</label>
                                    <input type="datetime-local" id="promo-end" class="w-full px-4 py-3 bg-white border-none rounded-xl text-[11px] font-bold text-gray-600 shadow-sm outline-none">
                                </div>
                            </div>

                            <div class="space-y-1">
                                <label class="text-[9px] font-black text-gray-400 ml-2 uppercase">Giới hạn số lượng bán</label>
                                <input type="number" id="promo-limit" placeholder="Nhập số lượng..." class="w-full px-4 py-3 bg-white border-none rounded-xl shadow-sm outline-none text-sm font-bold">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-7 space-y-6">
                    <p class="text-[10px] font-black text-[#bc9c75] uppercase tracking-widest flex items-center gap-2">
                        Đối tượng áp dụng
                    </p>
                    
                    <div class="grid grid-cols-3 gap-3">
                        <button onclick="selectType('product')" id="card-product" class="apply-card p-4 bg-gray-50 rounded-3xl border-2 border-transparent transition-all flex flex-col items-center gap-2 group hover:bg-white hover:shadow-lg">
                            <div class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center text-gray-300 group-hover:text-[#bc9c75] transition-all">
                                <i class="fa-solid fa-tag text-sm"></i>
                            </div>
                            <span class="font-bold text-[9px] uppercase text-gray-400 group-hover:text-gray-700">Sản phẩm</span>
                        </button>

                        <button onclick="selectType('category')" id="card-category" class="apply-card p-4 bg-gray-50 rounded-3xl border-2 border-transparent transition-all flex flex-col items-center gap-2 group hover:bg-white hover:shadow-lg">
                            <div class="w-10 h-10 rounded-xl bg-white shadow-sm flex items-center justify-center text-gray-300 group-hover:text-[#bc9c75] transition-all">
                                <i class="fa-solid fa-folder-tree text-sm"></i>
                            </div>
                            <span class="font-bold text-[9px] uppercase text-gray-400 group-hover:text-gray-700">Danh mục</span>
