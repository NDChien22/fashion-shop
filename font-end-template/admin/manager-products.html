                    <div class="grid grid-cols-3 gap-2">

                        <input type="text" id="colorInput" placeholder="Màu" class="bg-white border border-gray-200 rounded-xl py-2 px-3 text-xs focus:ring-1 focus:ring-[#bc9c75] outline-none">
                        <input type="number" id="qtyInput" placeholder="Số lượng" class="bg-white border border-gray-200 rounded-xl py-2 px-3 text-xs focus:ring-1 focus:ring-[#bc9c75] outline-none">
                    </div>
                    <button onclick="addNewVariant()" class="w-full bg-[#bc9c75] text-white py-2 rounded-xl text-xs font-bold shadow-lg shadow-[#bc9c75]/20">Thêm vào kho</button>
                </div>

                <div class="space-y-3">
                    <table class="w-full text-xs">
                        <thead class="text-gray-400 font-medium border-b">
                            <tr>
                                <th class="text-left py-2 px-2 w-[80px]">Size</th>
                                <th class="text-left px-2 w-[100px]">Màu</th>
                                <th class="text-left px-2 w-[80px]">Tồn kho</th>
                                <th class="text-right px-2">Hành động</th>
                            </tr>
                        </thead>
                        <tbody id="modalVariantList">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="/font-end-template/asset/js/admin.js"></script>
</body>
</html>
