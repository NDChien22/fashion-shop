<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - FAST FASHION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../asset/css/login.css">
   
 
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col ">
    <header id="header" class="h-16 flex-none bg-white border-b border-gray-100 flex items-center justify-between px-3 sm:px-6 md:px-8 gap-6 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <img 
            src="/asset/img/z7574203815922_6f6041439e8ca1d9b4cdea22b2f962d4.jpg"
            alt="FastFashion Logo"
            class="h-10 sm:h-12 md:h-16 ml-4 md:ml-7 object-contain">
        </div>
    </header>

    <div class="flex-grow flex items-center justify-center p-4">

        <div class="w-full max-w-[420px] bg-white rounded-[2.5rem] shadow-sm border border-gray-100 p-8 md:p-10 text-center">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Quên mật khẩu?</h2>
            <p class="text-gray-400 text-sm mb-8 px-2">
                Nhập email của bạn và chúng tôi sẽ gửi liên kết để đặt lại mật khẩu mới.
            </p>

            <form id="forgotForm" class="space-y-6">
                <div class="text-left">
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Địa chỉ Email</label>
                    <div class="relative group">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                        <input type="email" id="email" placeholder="example@gmail.com" 
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#bc9c75] text-white py-4 rounded-xl font-bold hover:opacity-90 transition shadow-md shadow-[#bc9c75]/20 active:scale-[0.98]">
                    GỬI LIÊN KẾT ĐẶT LẠI
                </button>

                <div class="pt-4">
                    <a href="login.html" class="inline-flex items-center gap-2 text-sm font-bold text-gray-400 hover:text-[#bc9c75] transition group">
                        <i class="fa-solid fa-arrow-left text-xs group-hover:-translate-x-1 transition-transform"></i>
                        Quay lại Đăng nhập
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="../asset/js/login.js"></script>
</body>
</html>
