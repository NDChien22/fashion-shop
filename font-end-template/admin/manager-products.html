<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý danh sách mẫu - Fast Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/asset/css/admin.css">
</head>
<body class="bg-[#f8f9fa] font-['Inter']">
    <main class="flex-1">
        <div id="content-area" style="transition: opacity 0.15s ease-in-out;"></div>
    </main>
    

    <template id="tpl-product-list">
        <div class="flex items-center justify-between mb-6">
            <div class="flex gap-4 flex-1">
                <div class="relative w-full max-w-[50%]">
                    <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                    <input type="text" placeholder="Tìm kiếm sản phẩm..." class="w-full bg-white border border-gray-100 rounded-xl py-2.5 pl-10 pr-4 text-xs focus:ring-1 focus:ring-[#bc9c75] outline-none shadow-sm">
                </div>

               

                <select id="prod-cate" class="bg-white border border-gray-100 rounded-xl px-4 py-2 text-xs shadow-sm outline-none w-40 text-gray-600">
                    <option value="">Danh mục</option>
                    <option>...</option>
                    <option>...</option>
                    <option>...</option>
                </select>

                <select id="prod-cate" class="bg-white border border-gray-100 rounded-xl px-4 py-2 text-xs shadow-sm outline-none w-40 text-gray-600">
                    <option value="">Bộ sưu tập</option>
                    <option>...</option>
                    <option>...</option>
                    <option>...</option>
                </select>
            </div>

            <button onclick="openForm('product')" class="px-5 py-2.5 bg-[#bc9c75] text-white rounded-xl text-xs font-bold shadow-md shadow-[#bc9c75]/20 hover:opacity-90 transition-all flex items-center gap-2">
                <i class="fa-solid fa-plus text-[10px]"></i> Thêm sản phẩm
            </button>
        </div>
    
        <div class="bg-white rounded-2xl shadow-sm border border-gray-50 overflow-hidden">
            <table class="w-full text-left text-[12px]">
                <thead class="bg-[#fcfaf8] border-b border-gray-50 text-gray-400 font-bold uppercase tracking-wider text-[10px]">
                    <tr>
                        <th class="px-6 py-4">Sản phẩm</th>
                        <th class="px-6 py-4 text-center">Danh mục</th>
                        <th class="px-6 py-4 text-center">Giá bán</th>
                        <th class="px-6 py-4 text-center">Tồn kho</th>
                        <th class="px-6 py-4 text-center">Trạng thái</th>
                        <th class="px-6 py-4 text-center">Thao tác</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-50 text-gray-600">
                    <tr class="hover:bg-gray-50/50 transition">
                        <td class="px-6 py-4 flex items-center gap-3">
                            
                            <div>
                                <img src="..." onclick="openModal('productDetailModal')" class="w-10 h-10 rounded-lg cursor-pointer hover:opacity-80">
                            </div>
                            <div>
                                <p class="font-bold text-gray-800">Classic Wool Coat</p>
                                <p class="text-[10px] text-gray-400">Mã: FW2026-001</p>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">Áo khoác</td>
                        <td class="px-6 py-4 text-center font-semibold">2.450.000đ</td>
                        <td class="px-6 py-4 text-center">12</td>
                        <td class="px-6 py-4 text-center">
                            <span class="bg-green-50 text-green-500 px-2 py-1 rounded-full font-bold text-[10px]">Đang bán</span>
                        </td>
                        <td class="px-6 py-4 text-center space-x-2">
                            <button onclick="openForm('product')" class="text-gray-400 hover:text-[#bc9c75]">
                                <i class="fa-regular fa-pen-to-square"></i>
                            </button>
                            <button class="text-gray-400 hover:text-red-500">
                                <i class="fa-regular fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </template>


    <template id="tpl-product-form">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
                    <h3 class="text-sm font-bold text-gray-800">Thông tin cơ bản</h3>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase">Mã sản phẩm</label>
                        <input type="text" id="prod-id" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase">Tên sản phẩm</label>
                        <input type="text" id="prod-name" placeholder="Ví dụ: Áo sơ mi lụa cao cấp" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                    </div>
                    <div>
                        <label class="text-[11px] font-bold text-gray-400 uppercase">Mô tả sản phẩm</label>
                        <textarea id="prod-desc" rows="4" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs"></textarea>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label class="text-[11px] font-bold text-gray-400 uppercase">Giá bán</label>
                            <input type="number" id="prod-price" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                        </div>
                        <div>
                            <label class="text-[11px] font-bold text-gray-400 uppercase">Phân loại</label>
                            <select id="prod-cate" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                                <option value="">-- Không chọn --</option>
                                <option>Áo khoác</option>
                                <option>Áo thun</option>
                                <option>Quần</option>
                            </select>
                        </div>

                        <div>
                            <label class="text-[11px] font-bold text-gray-400 uppercase">Bộ sưu tập</label>
                            <select id="prod-cate" class="w-full mt-1 bg-gray-50 rounded-xl py-2.5 px-4 text-xs">
                                <option value="">-- Không chọn --</option>
                                <option>...</option>
                                <option>...</option>
                                <option>...</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
                    <h3 class="text-sm font-bold text-gray-800">Biến thể sản phẩm</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <input id="size" type="text" placeholder="Size" class="bg-gray-50 rounded-xl py-2 px-3 text-xs border focus:ring-1 focus:ring-[#bc9c75] outline-none">
                        <input id="color" type="text" placeholder="Màu" class="bg-gray-50 rounded-xl py-2 px-3 text-xs border focus:ring-1 focus:ring-[#bc9c75] outline-none">
                        <input id="qty" type="number" placeholder="Số lượng" class="bg-gray-50 rounded-xl py-2 px-3 text-xs border focus:ring-1 focus:ring-[#bc9c75] outline-none">
                        <button onclick="addVariant()" class="bg-[#bc9c75] text-white rounded-xl text-xs py-2 hover:bg-[#a68a68]">Thêm</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-xs mt-3">
                            <thead class="border-b text-gray-500 font-medium">
                                <tr>
                                    <th class="text-left py-2">Size</th>
                                    <th class="text-left">Màu</th>
                                    <th class="text-left">Số lượng</th>
                                    <th class="text-right">Hành động</th>
                                </tr>
                            </thead>
                            <tbody id="variantList"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="text-sm font-bold text-gray-800 mb-4">Hình ảnh sản phẩm</h3>
                    <div class="relative group rounded-2xl overflow-hidden border border-gray-100 mb-4">
                        <img id="prod-img-main" src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?w=400" class="w-full h-48 object-cover">
                    </div>
                    <div class="border-2 border-dashed border-gray-100 rounded-2xl p-4 flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-gray-50">
                        <i class="fa-solid fa-plus text-[#bc9c75]"></i>
                        <p class="text-[10px] text-gray-400 font-medium">Thay đổi ảnh khác</p>
                    </div>
                    
                    <div class="mt-8">
                        <label class="text-[14px] font-semibold text-gray-700 ml-1 mb-3 block">Album hình ảnh</label>
                        <div class="flex gap-4">
                            <div onclick="openAlbumModal()" class="relative w-24 h-24 rounded-2xl cursor-pointer group">
                                <div class="absolute inset-0 bg-gray-200 rounded-2xl translate-x-2 -translate-y-2 z-0"></div>
                                <div class="absolute inset-0 bg-gray-100 rounded-2xl translate-x-1 -translate-y-1 z-10"></div>
                                <div class="absolute inset-0 rounded-2xl overflow-hidden border-2 border-white shadow-md z-20">
                                    <img src="/asset/img/product-1.jpg" class="w-full h-full object-cover" alt="Album">
                                    <div class="absolute inset-0 bg-black/40 flex flex-col items-center justify-center text-white">
                                        <span class="text-[16px] font-bold">+12</span>
                                        <span class="text-[10px]">Xem tất cả</span>
                                    </div>
                                </div>
                            </div>

                            <div class="w-24 h-24 rounded-2xl border-2 border-dashed border-gray-200 flex flex-col items-center justify-center gap-1 cursor-pointer hover:border-[#bc9c75] hover:bg-[#fffbf7] transition-all group">
                                <i class="fa-solid fa-plus text-[#bc9c75] text-sm"></i>
                                <span class="text-[11px] font-semibold text-gray-400 group-hover:text-[#bc9c75]">Thêm mới</span>
                            </div>
                        </div>
                    </div>   
                    
                    
                    <div id="albumModal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm p-4">
                        <div class="bg-white w-full max-w-2xl rounded-[32px] shadow-2xl overflow-hidden">
                            <div class="p-6 border-b border-gray-100 flex justify-between items-center">
                                <h3 class="text-[16px] font-bold text-gray-800">Tất cả hình ảnh (12)</h3>
                                <button onclick="closeAlbumModal()" class="w-10 h-10 rounded-full hover:bg-gray-100 flex items-center justify-center">
                                    <i class="fa-solid fa-xmark text-gray-400"></i>
                                </button>
                            </div>
                            
                            <div class="p-6 max-h-[60vh] overflow-y-auto">
                                <div class="grid grid-cols-3 md:grid-cols-4 gap-4" id="albumGrid">
                                    <div class="relative aspect-square rounded-xl overflow-hidden border border-gray-100 group">
                                        <img src="/asset/img/product-1.jpg" class="w-full h-full object-cover">
                                        <button class="absolute top-1 right-1 w-6 h-6 bg-red-500 text-white rounded-full opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i class="fa-solid fa-trash-can text-[10px]"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="p-6 bg-gray-50 flex justify-end gap-3">
                                <button onclick="closeAlbumModal()" class="px-6 py-2.5 rounded-xl text-[14px] font-semibold text-gray-500 hover:bg-gray-200 transition-all">Đóng</button>
                                <button class="px-6 py-2.5 rounded-xl text-[14px] font-semibold bg-[#bc9c75] text-white shadow-lg shadow-[#bc9c75]/20">Thêm ảnh mới</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="mb-6 flex justify-end gap-3">
                    <button onclick="loadPage('product-list')" class="px-6 py-2 border border-gray-200 rounded-xl text-xs font-semibold text-gray-500 hover:bg-gray-50">Quay lại</button>
                    <button id="btn-save-product" class="px-6 py-2 bg-[#bc9c75] text-white rounded-xl text-xs font-semibold shadow-sm hover:opacity-90">
                        Thêm sản phẩm
                    </button>
                </div>
            </div>
        </div>
    </template>

    


    <template id="tpl-collection">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div onclick="loadPage('collection-detail')" 
                class="bg-white p-6 rounded-[24px] border border-gray-100 shadow-sm hover:border-[#bc9c75] transition-all cursor-pointer group">
                <div class="w-full h-40 bg-[#fffbf7] rounded-2xl mb-4 flex items-center justify-center border border-orange-50">
                    <i class="fa-solid fa-images text-4xl text-[#bc9c75]/30 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-lg">Xuân Hè 2026</h3>
                <p class="text-sm text-gray-400 mt-1">24 sản phẩm • Cập nhật 2 ngày trước</p>
            </div>

            <div onclick="viewCollectionDetail('Bộ sưu tập Thu Đông 2025')" 
                class="bg-white p-6 rounded-[24px] border border-gray-100 shadow-sm hover:border-[#bc9c75] transition-all cursor-pointer group">
                <div class="w-full h-40 bg-gray-50 rounded-2xl mb-4 flex items-center justify-center border border-gray-100">
                    <i class="fa-solid fa-snowflake text-4xl text-blue-200 group-hover:scale-110 transition-transform"></i>
                </div>
                <h3 class="font-bold text-gray-800 text-lg">Thu Đông 2025</h3>
                <p class="text-sm text-gray-400 mt-1">18 sản phẩm • Cập nhật 1 tuần trước</p>
            </div>

            <div onclick="loadPage('add-collection')" class="border-2 border-dashed border-gray-200 rounded-[24px] flex flex-col items-center justify-center p-6 hover:bg-white hover:border-[#bc9c75] transition-all cursor-pointer text-gray-400 hover:text-[#bc9c75]">
                <i class="fa-solid fa-plus-circle text-3xl mb-2"></i>
                <span class="font-bold">Tạo BST mới</span>
            </div>
        </div>
    </template>


    <template id="tpl-collection-detail">
        <div class="space-y-6">
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                <div class="flex items-center gap-4">
                    <button onclick="loadPage('collection')" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-100">
                        <i class="fa-solid fa-arrow-left"></i>
                    </button>
                    <div class="flex items-center gap-3 bg-[#fffbf7] px-4 py-2 rounded-xl border border-orange-50 text-[#bc9c75]">
                        <i class="fa-solid fa-images"></i>
                        <span class="font-bold collection-title">Tên BST đang xem</span>
                    </div>
                </div>
                <button onclick="openProductSelectionModal()" class="bg-[#bc9c75] text-white px-6 py-2.5 rounded-xl font-bold flex items-center gap-2">
                    <i class="fa-solid fa-plus"></i> Thêm sản phẩm vào BST
                </button>
            </div>

            <div class="bg-white rounded-[24px] border border-gray-100 shadow-sm overflow-hidden">
                <div class="p-6 border-b border-gray-50">
                    <h3 class="text-[10px] uppercase tracking-widest font-bold text-gray-400">Sản phẩm trong bộ sưu tập</h3>
                </div>
                
                <div class="divide-y divide-gray-50">
                    <div class="p-6 flex items-center justify-between hover:bg-gray-50 transition-colors group">
                        <div  class="flex items-center gap-6">
                            <div class="w-20 h-24 bg-gray-100 rounded-2xl flex items-center justify-center border border-gray-50 overflow-hidden relative">
                                <img src="..." onclick="openModal('productDetailModal')" class="w-full h-full rounded-lg cursor-pointer hover:opacity-80">
                            </div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-lg">Classic Wool Coat</h4>
                                <p class="text-sm text-gray-400 mt-1">Mã: <span class="text-[#bc9c75]">FW2026-001</span></p>
                                <div class="flex gap-2 mt-2">
                                    <span class="text-[9px] bg-green-50 text-green-600 px-2 py-0.5 rounded font-bold uppercase">Còn hàng</span>
                                    <span class="text-[9px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded font-bold uppercase">Size: L, XL</span>
                                </div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <button onclick="openForm('product')" class="w-8 h-8 text-gray-400 hover:text-red-500"><i class="fa-regular fa-pen-to-square"></i></button>
                            <button class="w-8 h-8 text-gray-400 hover:text-red-500"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                </div>

                <div class="p-4 text-center border-t border-gray-50">
                    <button class="text-[#bc9c75] font-bold text-sm hover:underline">Xem thêm sản phẩm</button>
                </div>
            </div>
        </div>
    </template>



    <template id="tpl-add-collection">
        <div class="max-w-4xl mx-auto space-y-6">
            <div class="bg-white rounded-[24px] border border-gray-100 shadow-sm overflow-hidden">
                <form id="form-add-collection" class="p-8 space-y-8">
                    <div class="flex flex-col items-center justify-center border-2 border-dashed border-gray-100 rounded-[20px] p-10 bg-gray-50/30 hover:bg-[#fffbf7] hover:border-[#bc9c75]/30 transition-all cursor-pointer group">
                        <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center shadow-sm text-[#bc9c75] mb-4 group-hover:scale-110 transition-transform">
                            <i class="fa-solid fa-cloud-arrow-up text-2xl"></i>
                        </div>
                        <p class="font-bold text-gray-700">Tải lên ảnh bìa BST</p>
                        <p class="text-xs text-gray-400 mt-1">Khuyên dùng kích thước 1200x600px (Max 5MB)</p>
                        <input type="file" class="hidden" id="collection-cover">
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Tên bộ sưu tập</label>
                            <input type="text" placeholder="Ví dụ: Thu Đông 2026 - Urban Style" 
                                class="w-full rounded-xl p-4 border border-gray-200 focus:border-[#bc9c75] focus:ring-4 focus:ring-[#bc9c75]/5 outline-none transition-all">
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Loại BST</label>
                            <select class="w-full rounded-xl p-4 border border-gray-200 outline-none focus:border-[#bc9c75] bg-white">
                                <option>Thời trang Nam</option>
                                <option>Thời trang Nữ</option>
                                <option>Phụ kiện</option>
                                <option>Limited Edition</option>
                            </select>
                        </div>

                        <div class="space-y-2 md:col-span-2">
                            <label class="text-xs font-bold text-gray-500 uppercase">Mô tả (Không bắt buộc)</label>
                            <textarea rows="3" placeholder="Đôi dòng giới thiệu về cảm hứng của BST này..." 
                                    class="w-full rounded-xl p-4 border border-gray-200 focus:border-[#bc9c75] outline-none"></textarea>
                        </div>
                    </div>

                    <div class="pt-6 border-t flex justify-end gap-4">
                        <button onclick="loadPage('collection')" class="px-8 py-3.5 rounded-xl font-bold text-gray-400 hover:text-gray-600 transition-all">
                            Quay lại
                        </button>
                        <button class="bg-[#bc9c75] text-white px-10 py-3.5 rounded-xl font-bold shadow-lg shadow-[#bc9c75]/20 hover:brightness-95 active:scale-95 transition-all">
                            Thêm bộ sưu tập mới
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </template>







    <script src="/font-end-template/asset/js/admin.js"></script>


    
    
</body>

</html>
