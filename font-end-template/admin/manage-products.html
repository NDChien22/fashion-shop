<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Fashion Admin - Quản lý sản phẩm</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container-fluid">
        <div class="row">
            <main class="col-md-9 ms-sm-auto col-lg-10 px-md-5 main-wrapper">
                
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-5 pb-4 mb-4">
                    <div>
                        <h2 class="h3 fw-bold mb-1">Quản lý sản phẩm</h2>
                        <nav aria-label="breadcrumb">
                            <ol class="breadcrumb mb-0">
                                <li class="breadcrumb-item"><a href="#" class="text-decoration-none text-muted">Admin</a></li>
                                <li class="breadcrumb-item active fw-medium">Sản phẩm</li>
                            </ol>
                        </nav>
                    </div>
                    <div class="btn-toolbar mb-2 mb-md-0">
                        <button type="button" class="btn btn-dark px-4 py-2 shadow-sm rounded-0">
                            <i class="bi bi-plus-lg me-2"></i> THÊM SẢN PHẨM
                        </button>
                    </div>
                </div>

                <div class="card border-0 shadow-sm mb-5 p-2 rounded-3">
                    <div class="card-body">
                        <div class="row g-3 align-items-center">
                            <div class="col-md-5">
                                <div class="input-group search-box">
                                    <span class="input-group-text border-0 bg-transparent ps-3"><i class="bi bi-search"></i></span>
                                    <input type="text" class="form-control border-0 bg-transparent shadow-none" placeholder="Tìm kiếm sản phẩm...">
                                </div>
                            </div>
                            <div class="col-md-3">
                                <select class="form-select border-0 bg-light-gray shadow-none">
                                    <option selected>Danh mục</option>
                                    <option>Bộ sưu tập mới</option>
                                    <option>Đồ đông</option>
                                    <option>Phụ kiện</option>
                                </select>
                            </div>
                            <div class="col-md-2 text-md-end">
                                <button class="btn btn-outline-dark border-0 w-100 fw-medium">
                                    Lọc <i class="bi bi-sliders ms-2"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card border-0 shadow-sm overflow-hidden rounded-3 mb-5">
                    <div class="table-responsive">
                        <table class="table align-middle table-hover mb-0">
                            <thead class="bg-light-gray">
                                <tr>
                                    <th class="ps-4 py-3 text-uppercase small tracking-wider text-muted">Sản phẩm</th>
                                    <th class="py-3 text-uppercase small tracking-wider text-muted">Danh mục</th>
                                    <th class="py-3 text-uppercase small tracking-wider text-muted">Giá bán</th>
                                    <th class="py-3 text-uppercase small tracking-wider text-muted text-center">Tồn kho</th>
                                    <th class="py-3 text-uppercase small tracking-wider text-muted">Trạng thái</th>
                                    <th class="pe-4 py-3 text-end text-uppercase small tracking-wider text-muted">Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr>
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <div class="product-thumb me-3 rounded-2 shadow-sm border overflow-hidden">
                                                <img src="https://images.unsplash.com/photo-1591047139829-d91aecb6caea?q=80&w=150&auto=format&fit=crop" alt="product" width="50" height="65" style="object-fit: cover;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold">Classic Wool Coat</h6>
                                                <span class="text-muted small">SKU: FW2026-001</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>Áo khoác</td>
                                    <td class="fw-medium">2.450.000₫</td>
                                    <td class="text-center">12</td>
                                    <td><span class="status-badge status-active">Đang bán</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-icon me-2"><i class="bi bi-pencil-square"></i></button>
                                        <button class="btn btn-icon text-danger"><i class="bi bi-trash3"></i></button>
                                    </td>
                                </tr>
                                <tr>
                                    <td class="ps-4">
                                        <div class="d-flex align-items-center">
                                            <div class="product-thumb me-3 rounded-2 shadow-sm border overflow-hidden">
                                                <img src="https://images.unsplash.com/photo-1548624313-0396c75e4b1a?q=80&w=150&auto=format&fit=crop" alt="product" width="50" height="65" style="object-fit: cover;">
                                            </div>
                                            <div>
                                                <h6 class="mb-0 fw-bold">Silk Maxi Dress</h6>
                                                <span class="text-muted small">SKU: DR-0098</span>
                                            </div>
                                        </div>
                                    </td>
                                    <td>Váy đầm</td>
                                    <td class="fw-medium">1.890.000₫</td>
                                    <td class="text-center">05</td>
                                    <td><span class="status-badge status-out">Hết hàng</span></td>
                                    <td class="pe-4 text-end">
                                        <button class="btn btn-icon me-2"><i class="bi bi-pencil-square"></i></button>
                                        <button class="btn btn-icon text-danger"><i class="bi bi-trash3"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
