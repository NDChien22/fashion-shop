<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mật khẩu mới - FAST FASHION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../asset/css/login.css">
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col">
    <header id="header" class="h-16 flex-none bg-white border-b border-gray-100 flex items-center justify-between px-3 sm:px-6 md:px-8 gap-6 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <img 
            src="/asset/img/z7574203815922_6f6041439e8ca1d9b4cdea22b2f962d4.jpg"
            alt="FastFashion Logo"
            class="h-10 sm:h-12 md:h-16 ml-4 md:ml-7 object-contain">
        </div>
    </header>

    <div class="flex-grow flex items-center justify-center p-4">

        <div class="w-full max-w-[420px] bg-white rounded-[2.5rem] shadow-sm border border-gray-100 p-8 md:p-10">
            <h2 class="text-2xl font-bold text-gray-900 mb-2">Đổi mật khẩu</h2>
            <p class="text-gray-400 text-sm mb-8">Vui lòng nhập mật khẩu mới cho tài khoản của bạn.</p>

            <form id="newPasswordForm" class="space-y-5">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Mật khẩu mới</label>
                    <div class="relative group">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                        <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" 
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                    </div>
                    
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Xác nhận mật khẩu</label>
                    <div class="relative group">
                        <i class="fa-solid fa-check-double absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" 
                            class="w-full pl-11 pr-4 py-3.5 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#bc9c75] text-white py-4 rounded-xl font-bold hover:opacity-90 transition shadow-md shadow-[#bc9c75]/20 active:scale-[0.98] mt-4">
                    CẬP NHẬT MẬT KHẨU
                </button>

                <div class="text-center mt-6">
                    <a href="login.html" class="text-xs font-bold text-gray-400 hover:text-red-500 tracking-widest transition uppercase">
                        Hủy bỏ
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="../asset/js/login.js"></script>
</body>
</html>
