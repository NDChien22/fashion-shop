<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - FAST FASHION</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="../asset/css/login_logout.css">
    
</head>
<body class="bg-[#f8f9fa] min-h-screen flex flex-col">
    <header id="header" class="h-16 flex-none bg-white border-b border-gray-100 flex items-center justify-between px-3 sm:px-6 md:px-8 gap-6 sticky top-0 z-40">
        <div class="flex items-center gap-3">
            <img 
            src="/asset/img/z7574203815922_6f6041439e8ca1d9b4cdea22b2f962d4.jpg"
            alt="FastFashion Logo"
            class="h-10 sm:h-12 md:h-16 ml-4 md:ml-7 object-contain">
        </div>
    </header>

    <div class="grow flex items-center justify-center p-4">

        <div class="w-full max-w-[480px] bg-white rounded-[2.5rem] shadow-sm border border-gray-100 p-8 md:p-10">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-900">Tạo tài khoản</h2>
                <p class="text-gray-400 text-sm mt-2">Tham gia cùng chúng tôi ngay hôm nay!</p>
            </div>

            <form id="signupForm" class="space-y-4">
                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Tên đăng nhập</label>
                    <div class="relative group">
                        <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                        <input type="text" id="username" placeholder="Nhập username" 
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                    </div>
                </div>

                <div>
                    <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Email</label>
                    <div class="relative group">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                        <input type="email" id="email" placeholder="example@gmail.com" 
                            class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Mật khẩu</label>
                        <div class="relative group">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                            <input type="password" id="password" placeholder="••••••••" 
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-gray-400 uppercase tracking-wider mb-2 ml-1">Xác nhận</label>
                        <div class="relative group">
                            <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 group-focus-within:text-[#bc9c75] transition-colors"></i>
                            <input type="password" id="confirmPassword" placeholder="••••••••" 
                                class="w-full pl-11 pr-4 py-3 bg-gray-50 border border-gray-100 rounded-xl outline-none focus:border-[#bc9c75] focus:ring-1 focus:ring-[#bc9c75] transition-all text-sm" required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-[#bc9c75] text-white py-4 mt-6 rounded-xl font-bold hover:opacity-90 transition shadow-md shadow-[#bc9c75]/20 active:scale-[0.98]">
                    ĐĂNG KÝ NGAY
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-gray-100 text-center">
                <p class="text-sm text-gray-400 mb-4">Đã có tài khoản?</p>
                <a href="login.html" class="inline-block w-full py-3.5 border border-gray-200 rounded-xl font-bold text-gray-700 hover:bg-gray-50 hover:border-[#bc9c75] hover:text-[#bc9c75] transition text-sm">
                    QUAY LẠI ĐĂNG NHẬP
                </a>
            </div>
        </div>
    </div>

    <script src="../asset/js/login.js"></script>
</body>
</html>
